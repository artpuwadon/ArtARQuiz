<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Quiz AR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>🎨 เกมโชว์ท้าประลอง ศิลปะ ม.1</h1>

    <div class="score-board">
        <h3 id="number" style="color: #ffb300;">ข้อที่ 1</h3>
        <h3 id="score" style="color: #00ff88;">คะแนน : 0</h3>
    </div>

    <!-- แถบจับเวลาถอยหลังสุดตื่นเต้น -->
    <div class="timer-container">
        <div id="timer-bar"></div>
    </div>

    <div class="camera">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <h2 id="question">กำลังโหลดคำถาม...</h2>

    <div class="btn-container">
        <button id="btnA" onclick="checkAnswer('A')">A</button>
        <button id="btnB" onclick="checkAnswer('B')">B</button>
    </div>

    <h2 id="result"></h2>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="questions.js"></script>
<script src="script.js"></script>
  
</body>
</html>
